    <meta name="twitter:image" content="https://www.jsonsanitizer.com/og.png" />

    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#e1f2f3" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#181b1f" media="(prefers-color-scheme: dark)" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSON Sanitizer</title>
    <script>
      (() => {
        const lightTheme = 'sanitizer';
        const darkTheme = 'sanitizer-dark';
        const themeStorageKey = 'jsonsanitizer-theme';
        const storedTheme = window.localStorage.getItem(themeStorageKey);
        const theme =
          storedTheme === lightTheme || storedTheme === darkTheme
            ? storedTheme
            : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? darkTheme
              : lightTheme;

        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
